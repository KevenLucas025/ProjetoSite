


<div class="modal-sugestao"
     id="modalSugestao"
     role="dialog"
     aria-modal="true"
     aria-labelledby="tituloModal">

  <div class="modal-conteudo">

    <button class="modal-fechar"
            id="fecharSugestao"
            aria-label="Fechar modal">
      &times;
    </button>

    <h2 id="tituloModal">
      Relatar um problema ou sugestão
    </h2>

    <form id="formSugestao">

      <label for="assunto">Assunto</label>
      <select id="assunto" name="assunto" required>
        <option value="">Selecione...</option>
        <option>Erro</option>
        <option>Bug</option>
        <option>Sugestão de Melhoria</option>
        <option>Nova Funcionalidade</option>
        <option>Outro</option>
      </select>

      <label for="nome">Nome</label>
      <input type="text"
             id="nome"
             name="nome"
             placeholder="Digite seu nome"
             autocomplete="name"
             required>

      <label for="email">Email</label>
      <input type="email"
             id="email"
             name="email"
             placeholder="Digite seu email"
             autocomplete="email"
             required>

      <label for="mensagem">Descrição</label>
      <textarea id="mensagem"
                name="mensagem"
                rows="5"
                placeholder="Descreva o problema ou sugestão"
                required></textarea>

      <footer class="acoes-form">

        <button type="button" class="btn-cancelar" onclick="fecharModal()">
          Cancelar
        </button>

        <button type="submit" id="btnEnviar">
          <span class="texto-btn">Enviar</span>
          <span class="spinner"></span>
        </button>

      </footer>

    </form>

  </div>

  <div id="toast" class="toast">
    ✅ Sugestão enviada com sucesso!
  </div>

</div>
