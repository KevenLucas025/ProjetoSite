<!doctype html>
<html lang="pt-br">
{% load static %}


<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{% block title %}Keven | Portfólio{% endblock %}</title>

  <link rel="icon" type="image/png" href="{% static 'imagem_navegador/logo_site.png' %}">


</head>

  <style>

  body{
    font-family: system-ui, Arial;
    max-width: 980px;
    margin: 0 auto;
    padding: 30px;
    line-height: 1.5;
    background-color: #0f0f0f;
    color: #e5e5e5;
  }

  /*Background dos botões de navegação*/
  nav{
    position: sticky;
    top: 10px;
    z-index: 1000;
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 30px;
    
    background: rgba(255, 255, 255,0.05);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);

    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;

    padding: 10px 20px;

  }
  /*Botões de navegação*/
  nav a{
    color: #e5e5e5;
    font-weight: 500px;
    padding: 8px 16px;
    border-radius: 8px;
    text-decoration: none;
    transition: 0.25s ease;
    
  }
  /*Botões de navegação passando mouse por cima*/
  nav a:hover{
    background-color:  #4dd0e1;
    color: black;
  }

  /*Card da home*/
  .grid{
    display: flex;
    justify-content: flex-start; /* tira do centro */
    gap: 30px;
    flex-wrap: wrap;
    padding-left: 40px;
  }
  /*layout dos cards*/
  .card{
    background-color: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 14px;
  }
  

  .tag{
    display: inline-block;
    padding: 2px 8px;
    border: 3px solid #ccc;
    border-radius: 999px;
    font-size: 12px;
    margin-right: 6px;
  }

  .hero{
    text-align: center;
    margin-bottom: 40px;
  }

  .hero h1{
    font-size: 42px;
    margin-bottom: 10px;
  }

  .hero p{
    font-size: 18px;
    color: #9ca3af;
  }

  .projeto-card{
    overflow: hidden;
    width: 260px;
    height: 280px;
    margin: 0 auto;

  }
  .imagem-container{
    position: relative;
    width: 100%;
    height: 280px;
    border-radius: 12px;
    overflow: hidden;
    
  }
  .projeto-img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.3s ease;
  }
  .overlay{
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.72);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 12px;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .imagem-container:hover .overlay{
    opacity: 1;
  }
  .imagem-container:hover .projeto-img{
    transform: scale(1.05);
  }
  .btn-overlay{
    background-color: white;
    color: black;
    padding: 10px 16px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.2s ease;
  }
  .btn-overlay:hover{
    background-color: #2563eb;
    color: white;
  }
  .sem-imagem{
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #aaa;
    font-weight: bold;
    background-color: #1f1f1f;
  }
  .destaque-card{
    overflow: hidden;
    width: 700px;
    height: 380px;
    margin: 0 auto;
  }
  .destaque-card .imagem-container{
    height: 380px;
  }
  /*Texto da trajetória*/
  .trajetoria {
    column-count: 2;       /* Define 2 colunas automáticas */
    column-gap: 40px;      /* Espaço entre as colunas */
    text-align: justify;
    column-fill: balance;
  }
  /* Isso remove qualquer recuo estranho no primeiro item de cada coluna */
  .trajetoria p:first-child {
    margin-top: 0;
    
  }
  /*Texto da trajetória*/
  .trajetoria p {
    break-inside: avoid; 
    margin-top: 0;
    margin-bottom: 0.5em; /* Controla o espaço entre os parágrafos */
  }
  /*Título da trajetória*/
  .titulo-trajetoria {
    column-span: all;      /* Faz o título atravessar todas as colunas */
    text-align: center;
    margin-bottom: 30px;
  }
  /*Risco em baixo do título*/
  .titulo-trajetoria::after{
    content: "";
    width: 60px;
    height: 3px;
    background: #4dd0e1;
    display: block;
    margin: 12px auto 0;
    border-radius: 10px;

  }
  @media (max-width: 768px) {
    .trajetoria {
      grid-template-columns: 1fr;
    }
  }
  /*Título minhas habilidades*/
  h2{
    text-align: center;
  }
  footer{
    text-align: center;
    margin-top: 40px;
    color: #9ca3af;
    font-size: 14px;
  }
  .contato-grid{
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(240px, 1fr));
    gap: 20px;
    margin-top: 30px;
  }
  .contato-card{
    display: block;
    background-color: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 16px;
    padding: 20px;
    text-decoration: none;
    color: #e5e5e5;
    transition: 0.25s ease;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  }

  .contato-card:hover{
    transform: translateY(-4px);
    border-color: #3b82f6;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  }

  .contato-card h3{
    margin: 0 0 10px 0;
    font-size: 20px;
    color: white;
  }

  .contato-card p{
    margin: 0;
    color: #9ca3af;
    word-break: break-word;
  }
  /*Títulos principais da home*/
  .hero-home{
    max-width: 1100px;
    margin: 100px auto 80px;
    text-align: center; /* tira do centro */
    padding-left: 40px; /* desloca pro lado */
    background: radial-gradient(circle at top left,  #1a1a1a, #0f0f0f);
    position: relative;
    overflow: hidden;
  }

  .hero-badge{
    display: inline-block;
    background-color: #151a2d;
    color: white;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 18px;
    border-radius: 10px;
    margin-bottom: 24px;
  }

  .hero-intro{
    font-weight: 500;
    color: #e5e5e5;
    margin-bottom: 10px;
  }

  
  .hero-intro span{
    color: #22d3ee;
    font-weight: bold;
  }

  .hero-title{
    font-size: 80px;
    font-weight: 900;
    line-height: 1.05;
    margin: 0 0 20px 0;
    color: white;
  }

  .hero-subtitle{
    max-width: 760px;
    margin: 0 auto 32px;
    font-size: 22px;
    color: #cbd5e1;
    line-height: 1.6;
  }
  /*botões de conhecer mais*/
  .hero-btn{
    display: inline-block;
    background: linear-gradient(135deg, #4dd0e1, #22d3ee);
    color: black;
    font-weight: bold;
    text-decoration: none;
    padding: 16px 42px;
    border-radius: 10px;
    transition: 0.3s ease;

  }
  /*botões de email e cv*/
  .btn-cv,
  .btn-email{
    display: inline-block;
    background-color: #4dd0e1;
    color: black;
    font-weight: bold;
    text-decoration: none;
    padding: 14px 36px;
    border-radius: 8px;
    transition: 0.25s ease;
  }
  /*botões de email e cv*/
  .btn-cv:hover,
  .btn-email:hover{
    background-color: #22d3ee;
    transform: translateY(-2px);
  }
  /*botões de email e cv*/
  .hero-btn:hover{
    background-color: #22d3ee;
    transform: translateY(-2px);
  }
  .sobre-acoes{
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 30px;
    flex-wrap: wrap;
  }

  .habilidades-section {
    margin-top: 40px;
    text-align: center;
  }

  .habilidades-section h2 {
    font-size: 28px;
    margin-bottom: 20px;
    color: white;
  }

  .habilidades-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 20px;
    margin-top: 30px;
}

  .habilidade-card {
    height: 140px;
    border-radius: 14px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding: 14px;
    cursor: pointer;
    transition: transform 0.3s ease;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
  }

  .habilidade-card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.45);
    transition: background 0.3s ease;
  }

  .habilidade-card span {
    position: relative;
    z-index: 1;
    color: white;
    font-weight: bold;
    font-size: 18px;
  }

  .habilidade-card:hover {
    transform: translateY(-6px) scale(1.02);
  }

  .habilidade-card:hover::before {
    background: rgba(0, 0, 0, 0.25);
  }

  /* Imagens de fundo */
  .habilidade-card.python {
    background-image: url('/static/imagens_habilidades/Python_Imagem.png');
  }

  .habilidade-card.html {
    background-image: url('/static/imagens_habilidades/icone-html-orange.png');
  }

  .habilidade-card.css {
    background-image: url('/static/imagens_habilidades/css_logo.png');
  }

  .habilidade-card.django {
    background-image: url('/static/imagens_habilidades/django_logo.png');
  }

  .habilidade-card.sqlite {
    background-image: url('/static/imagens_habilidades/SQLite-Logo.png');
  }

  .habilidade-card.github {
    background-image: url('/static/imagens_habilidades/github_logo.png');
  }

  .habilidade-card.windows{
    background-image: url('/static/imagens_habilidades/windows_logo.png');
  }
  .habilidade-card.filmora9{
    background-image: url('/static/imagens_habilidades/filmora.png');
  }
  /*Botões dentro dos cards*/
  .overlay-botoes{
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: center;
  }

  .btn-detalhes{
    border: none;
    cursor: pointer;
  }

  /*Janela dentro dos cards*/
  .modal{
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.75);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    padding: 20px;
  }

  .modal.ativo{
    display: flex;
  }

  .modal-conteudo{
    background: #161616;
    color: #e5e5e5;
    width: 100%;
    max-width: 600px;
    border-radius: 16px;
    padding: 28px;
    position: relative;
    border: 1px solid #2a2a2a;
    box-shadow: 0 20px 40px rgba(0,0,0,0.45);
    text-align: left;
  }

  .modal-conteudo h2{
    text-align: left;
    margin-top: 0;
    margin-bottom: 18px;
    color: white;
  }

  .modal-conteudo p{
    color: #cbd5e1;
    font-size: 16px;
    margin-bottom: 18px;
  }

  .modal-fechar{
    position: absolute;
    top: 12px;
    right: 14px;
    background: transparent;
    border: none;
    color: white;
    font-size: 28px;
    cursor: pointer;
  }

  .modal-botoes{
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 20px;
  }
  #modalDescricao,
  #modalTecnologias{
    white-space: pre-line;
  }
  .modal-video-conteudo {
    max-width: 900px;
  }
  .video-wrapper {
    width: 100%;
    margin-top: 20px;
  }
  #videoProjeto{
    width: 100%;
    max-height: 70vh;
    border-radius: 12px;
    background: black;
    display: block;
  }
  .contato-item{
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .contato-item img{
    width: 28px;
    height: 28px;
  }
  
  @keyframes fadeUp {
    from {
      opacity: 0;
      transform: translateY(40px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .animar {
    opacity: 0;
    animation: fadeUp 1s ease forwards;
  }
  /* BOTÃO SECUNDÁRIO */
  .btn-secundario{
    display: inline-block;
    border: 1px solid #4dd0e1;
    color: #4dd0e1;
    padding: 14px 36px;
    border-radius: 8px;
    text-decoration: none;
    transition: 0.25s;
  }

  .btn-secundario:hover{
    background-color: #4dd0e1;
    color: black;
  }

  /* AÇÕES HERO */
  .hero-acoes{
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
  }

  /* TÍTULOS DE SEÇÃO */
  .titulo-secao{
    text-align: center;
    font-size: 28px;
    margin: 60px 0 30px;
    position: relative;
  }

  .titulo-secao::after{
    content: "";
    width: 60px;
    height: 3px;
    background: #4dd0e1;
    display: block;
    margin: 10px auto 0;
    border-radius: 10px;
  }

  /* PROJETO DESTAQUE */
  .projeto-destaque{
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 40px;
    align-items: center;
    margin-bottom: 40px;
  }

  .destaque-img img{
    width: 100%;
    border-radius: 12px;
  }
  /* Faz o destaque maior */
  .projeto-destaque .imagem-container{
    height: 380px;
  }

  .destaque-info h3{
    font-size: 28px;
    margin-bottom: 10px;
  }
  .destaque-info p{
    color: #cbd5e1;
    margin-bottom: 20px;
    line-height: 1.6;
  }

  .botoes-destaque{
    display: flex;
    gap: 12px;
  }

  /* RESPONSIVO */
  @media (max-width: 768px){
    .projeto-destaque{
      grid-template-columns: 1fr;
    }
  }
  .hero-social{
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-top: 25px;
  }

  .social-icon{
    width: 50px;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.25s ease;
  }

  .social-icon img{
    width: 50px;
    height: 50px;
    transition: 0.25s;
  }

  .social-icon:hover{
    transform: translateY(-5px) scale(1.05);
    filter: drop-shadow(0 0 10px rgba(77, 208, 225, 0.7));
  }

  </style>
</head>

<body>

<nav>
  <a href="/">HOME</a>
  <a href="/sobre/">SOBRE</a>
  <a href="/projetos/">PROJETOS</a>
  <a href="/contato/">CONTATO</a>
</nav>

{% block content %}{% endblock %}

<footer>© {% now "Y" %} Keven Lucas</footer>

<script>
window.addEventListener("scroll", () => {
  const scroll = window.scrollY;
  const hero = document.querySelector(".hero-home");

  if (hero) {
    hero.style.transform = `translateY(${scroll * 0.2}px)`;
  }
});
</script>

</body>
</html>
