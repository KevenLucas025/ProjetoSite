<!doctype html>
<html lang="pt-br">
{% load static %}


<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{% block title %}Keven | Portfólio{% endblock %}</title>

  <link rel="icon" type="image/png" href="{% static 'imagem_navegador/logo_site.png' %}">


</head>

  <style>
    
  body{
    font-family: system-ui, Arial;
    margin: 0 auto;
    padding: 30px;
    line-height: 1.5;
    background-color: #0f0f0f;
    color: #e5e5e5;
  }
  .container{
    max-width: 980px;
    margin: 0 auto;
    padding: 30px;
  }

  /* FUNDO OCUPANDO A TELA TODA */
  .nav-bg{
    position: sticky;
    top: 0;
    z-index: 999;

    width: 100%;
    background: rgba(255, 255, 255,0.05);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);

    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }

  nav{
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    justify-content: center;
    gap: 12px;
    padding: 10px 20px;
  }

  /*Botões de navegação*/
  nav a{
    color: #e5e5e5;
    font-weight: 500px;
    padding: 8px 16px;
    border-radius: 8px;
    text-decoration: none;
    transition: 0.25s ease;
    
  }
  /*Botões de navegação passando mouse por cima*/
  nav a:hover{
    background-color:  #4dd0e1;
    color: black;
  }

  /*Card da home*/
  .grid{
    display: flex;
    justify-content: flex-start; /* tira do centro */
    gap: 30px;
    flex-wrap: wrap;
    padding-left: 40px;
  }
  /*layout dos cards*/
  .card{
    background-color: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 14px;
  }
  

  .tag{
    display: inline-block;
    padding: 2px 8px;
    border: 3px solid #ccc;
    border-radius: 999px;
    font-size: 12px;
    margin-right: 6px;
  }

  .hero{
    text-align: center;
    margin-bottom: 40px;
  }

  .hero h1{
    font-size: 42px;
    margin-bottom: 10px;
  }

  .hero p{
    font-size: 18px;
    color: #9ca3af;
  }

  .projeto-card{
    overflow: hidden;
    width: 260px;
    height: 280px;
    margin: 0 auto;

  }
  .imagem-container{
    position: relative;
    width: 100%;
    height: 280px;
    border-radius: 12px;
    overflow: hidden;
    
  }
  .projeto-img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.3s ease;
  }
  .overlay{
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.72);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 12px;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .imagem-container:hover .overlay{
    opacity: 1;
  }
  .imagem-container:hover .projeto-img{
    transform: scale(1.05);
  }
  .btn-overlay{
    background-color: white;
    color: black;
    padding: 10px 16px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.2s ease;
  }
  .btn-overlay:hover{
    background-color: #2563eb;
    color: white;
  }
  .sem-imagem{
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #aaa;
    font-weight: bold;
    background-color: #1f1f1f;
  }
  .destaque-card{
    overflow: hidden;
    width: 700px;
    height: 380px;
    margin: 0 auto;
  }
  .destaque-card .imagem-container{
    height: 380px;
  }
  /*Texto da trajetória*/
  .trajetoria {
    column-count: 2;       /* Define 2 colunas automáticas */
    column-gap: 40px;      /* Espaço entre as colunas */
    text-align: justify;
    column-fill: balance;
  }
  /* Isso remove qualquer recuo estranho no primeiro item de cada coluna */
  .trajetoria p:first-child {
    margin-top: 0;
    
  }
  /*Texto da trajetória*/
  .trajetoria p {
    break-inside: avoid; 
    margin-top: 0;
    margin-bottom: 0.5em; /* Controla o espaço entre os parágrafos */
  }
  /*Título da trajetória*/
  .titulo-trajetoria {
    column-span: all;      /* Faz o título atravessar todas as colunas */
    text-align: center;
    margin-bottom: 30px;
  }
  /*Risco em baixo do título*/
  .titulo-trajetoria::after{
    content: "";
    width: 60px;
    height: 3px;
    background: #4dd0e1;
    display: block;
    margin: 12px auto 0;
    border-radius: 10px;

  }

  
  /*Título minhas habilidades*/
  h2{
    text-align: center;
  }
  footer{
    text-align: center;
    margin-top: 40px;
    color: #9ca3af;
    font-size: 14px;
  }
  .contato-grid{
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(240px, 1fr));
    gap: 20px;
    margin-top: 30px;
  }
  .contato-card{
    display: block;
    background-color: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 16px;
    padding: 20px;
    text-decoration: none;
    color: #e5e5e5;
    transition: 0.25s ease;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  }

  .contato-card:hover{
    transform: translateY(-4px);
    border-color: #3b82f6;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  }

  .contato-card h3{
    margin: 0 0 10px 0;
    font-size: 20px;
    color: white;
  }

  .contato-card p{
    margin: 0;
    color: #9ca3af;
    word-break: break-word;
  }
  /*Títulos principais da home + background do quadrado*/
  .hero-home{
    margin: 150px auto 100px;
    text-align: center; /* tira do centro */
    max-width: 1400px;
    padding-left: 60px 20px; /* desloca pro lado */
    position: relative;
    overflow: visible; /* Garante que o título não seja cortado */
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .hero-badge{
    display: inline-block;
    background-color: #151a2d;
    color: white;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 18px;
    border-radius: 10px;
    margin-bottom: 24px;
  }
  /*Texto acima do desenvolvedor python*/
  .hero-intro{
    font-size: 24px; /* Aumentado */
    font-weight: 500;
    color: #e5e5e5;
    margin-bottom: 10px;
    letter-spacing: 1px;
  }

  
  .hero-intro span{
    color: #22d3ee;
    font-weight: bold;
  }

  .hero-title {
    font-size: clamp(20px, 15vw, 100px) !important;
    font-weight: 800;
    line-height: 0.85;
    letter-spacing: -2px;
    margin: 10px 0 30px 0;
    color: white;
    white-space: nowrap; /* 🔥 ISSO resolve */
  }

  .hero-subtitle{
    max-width: 3000px;
    margin: 0 auto 32px;
    font-size: clamp(18px, 2vw, 26px) !important;
    color: #cbd5e1;
    line-height: 1.6;
    font-weight: 300;
  }
  /*botões de conhecer mais*/
  .hero-btn{
    display: inline-block;
    background: linear-gradient(135deg, #4dd0e1, #22d3ee);
    color: black;
    font-weight: bold;
    text-decoration: none;
    padding: 16px 42px;
    border-radius: 10px;
    transition: 0.3s ease;

  }


  /*botões de email e cv*/
  .btn-cv,
  .btn-email{
    display: inline-block;
    background-color: #4dd0e1;
    color: black;
    font-weight: bold;
    text-decoration: none;
    padding: 14px 36px;
    border-radius: 8px;
    transition: 0.25s ease;
  }
  /*botões de email e cv*/
  .btn-cv:hover,
  .btn-email:hover{
    background-color: #22d3ee;
    transform: translateY(-2px);
  }
  /*botões de email e cv*/
  .hero-btn:hover{
    background-color: #22d3ee;
    transform: translateY(-2px);
  }
  .sobre-acoes{
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 30px;
    flex-wrap: wrap;
  }

  .habilidades-section {
    margin-top: 40px;
    text-align: center;
  }

  .habilidades-section h2 {
    font-size: 28px;
    margin-bottom: 20px;
    color: white;
  }

  .habilidades-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 20px;
    margin-top: 30px;
  }

  /*botoes da home,github e linkedin*/
  .social-icon{
    width: 45px;
    height: 45px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.3s ease;
  }
  /*botoes da home,github e linkedin*/
  .social-icon img {
    width: auto;      /* Deixa a largura livre */
    height: 100%;     /* Força os dois a terem a mesma ALTURA exata */
    max-width: 100%;  /* Garante que não ultrapasse o box */
    object-fit: contain; /* Mantém a proporção sem achatar */
  
  }
  .social-icon:hover img{
    filter: brightness(0) saturate(100%) invert(73%) sepia(36%) saturate(641%) hue-rotate(147deg) brightness(94%) contrast(92%);
  }
  
 
  /*ìcones da home,github e linkedin*/
  .hero-social{
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 20px;
    display: flex;
    margin-top: -30px;
    width: 100%; /* Ocupa a largura total para o justify funcionar */
    }


  .habilidade-card {
    height: 140px;
    border-radius: 14px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding: 14px;
    cursor: pointer;
    transition: transform 0.3s ease;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
  }

  .habilidade-card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.45);
    transition: background 0.3s ease;
  }

  .habilidade-card span {
    position: relative;
    z-index: 1;
    color: white;
    font-weight: bold;
    font-size: 18px;
  }

  .habilidade-card:hover {
    transform: translateY(-6px) scale(1.02);
  }

  .habilidade-card:hover::before {
    background: rgba(0, 0, 0, 0.25);
  }

  /* Imagens de fundo */
  .habilidade-card.python {
    background-image: url('/static/imagens_habilidades/Python_Imagem.png');
  }

  .habilidade-card.html {
    background-image: url('/static/imagens_habilidades/icone-html-orange.png');
  }

  .habilidade-card.css {
    background-image: url('/static/imagens_habilidades/css_logo.png');
  }

  .habilidade-card.django {
    background-image: url('/static/imagens_habilidades/django_logo.png');
  }

  .habilidade-card.sqlite {
    background-image: url('/static/imagens_habilidades/SQLite-Logo.png');
  }

  .habilidade-card.github {
    background-image: url('/static/imagens_habilidades/github_logo.png');
  }

  .habilidade-card.windows{
    background-image: url('/static/imagens_habilidades/windows_logo.png');
  }
  .habilidade-card.filmora9{
    background-image: url('/static/imagens_habilidades/filmora.png');
  }
  /*Botões dentro dos cards*/
  .overlay-botoes{
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: center;
  }

  .btn-detalhes{
    border: none;
    cursor: pointer;
  }

  /*Janela dentro dos cards*/
  .modal{
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.75);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    padding: 20px;
  }

  .modal.ativo{
    display: flex;
  }

  .modal-conteudo{
    background: #161616;
    color: #e5e5e5;
    width: 100%;
    max-width: 600px;
    border-radius: 16px;
    padding: 28px;
    position: relative;
    border: 1px solid #2a2a2a;
    box-shadow: 0 20px 40px rgba(0,0,0,0.45);
    text-align: left;
  }

  .modal-conteudo h2{
    text-align: left;
    margin-top: 0;
    margin-bottom: 18px;
    color: white;
  }

  .modal-conteudo p{
    color: #cbd5e1;
    font-size: 16px;
    margin-bottom: 18px;
  }

  .modal-fechar{
    position: absolute;
    top: 12px;
    right: 14px;
    background: transparent;
    border: none;
    color: white;
    font-size: 28px;
    cursor: pointer;
  }

  .modal-botoes{
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 20px;
  }
  #modalDescricao,
  #modalTecnologias{
    white-space: pre-line;
  }
  .modal-video-conteudo {
    max-width: 900px;
  }
  .video-wrapper {
    width: 100%;
    margin-top: 20px;
  }
  #videoProjeto{
    width: 100%;
    max-height: 70vh;
    border-radius: 12px;
    background: black;
    display: block;
  }
  .contato-item{
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .contato-item img{
    width: 28px;
    height: 28px;
  }
  
  @keyframes fadeUp {
    from {
      opacity: 0;
      transform: translateY(40px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .animar {
    opacity: 0;
    animation: fadeUp 1s ease forwards;
  }
  /* BOTÃO SECUNDÁRIO */
  .btn-secundario{
    display: inline-block;
    border: 1px solid #4dd0e1;
    color: #4dd0e1;
    padding: 14px 36px;
    border-radius: 8px;
    text-decoration: none;
    transition: 0.25s;
  }

  /* BOTÃO SECUNDÁRIO */
  .btn-secundario:hover{
    background-color: #4dd0e1;
    color: black;
  }

  /* AÇÕES HERO */
  .hero-acoes{
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 25px;
    transform: translateY(-30px); /* 🔥 sobe sem quebrar nada,os botões conhecer mais e ber projetos */
  }

  /* TÍTULOS DE SEÇÃO */
  .titulo-secao{
    text-align: center;
    font-size: 28px;
    margin: 60px 0 30px;
    position: relative;
  }

  .titulo-secao::after{
    content: "";
    width: 60px;
    height: 3px;
    background: #4dd0e1;
    display: block;
    margin: 10px auto 0;
    border-radius: 10px;
  }

  /* PROJETO DESTAQUE */
  .projeto-destaque{
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 40px;
    align-items: center;
    margin-bottom: 40px;
  }

  .destaque-img img{
    width: 100%;
    border-radius: 12px;
  }
  /* Faz o destaque maior */
  .projeto-destaque .imagem-container{
    height: 380px;
  }

  .destaque-info h3{
    font-size: 28px;
    margin-bottom: 10px;
  }
  .destaque-info p{
    color: #cbd5e1;
    margin-bottom: 20px;
    line-height: 1.6;
  }

  .botoes-destaque{
    display: flex;
    gap: 12px;
  }
  .menu-toggle{
    position: fixed;
    top: 6px;
    right: 20px;
    font-size: 35px;
    background: transparent;
    border: none;
    color: white;
    cursor: pointer;
    }
  /* menu escondido */
  .menu-dropdown{
    position: absolute;
    top: 60px;
    right: 20px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 10px;
    display: none;
    flex-direction: column;
    gap: 10px;
  }
  .menu-dropdow a{
    color: white;
    text-decoration: none;
    padding: 8px 12px;
    border-radius: 6px;
  }
  .menu-dropdown a:hover{
    background: #4dd0e1;
    color: black;
  }

  /* quando ativo */
  .menu-dropdown.ativo{
    display: flex;
  }
  @media (max-width: 768px){
    /* TÍTULO PRINCIPAL */
    .hero-title {
      font-size: 36px !important;
      white-space: normal !important; /* 🔥 ESSENCIAL */
      line-height: 1.1;
      letter-spacing: -1px;
      text-align: center;
      width: 100%;
    }

    /* BODY */
    body{
      padding: 15px;
    }

    /* NAVBAR */
     nav {
      display: flex-end !important;
      padding: 10px 20px;
      align-items: center;
      padding: 15px 20px;
      position: relative; /* Base para o dropdown */
      min-height: 30px;
    }

    nav a{
      display: none; /*Esconde a barra do background dos botões de navegação*/
    }

    /* HERO (remove o deslocamento lateral) */
    /* REMOVE BUG DE SOBREPOSIÇÃO */
    .hero,
    .hero-home{
      position: relative;
      z-index: 2;
    }
    .menu-toggle {
      display: block; /* Mostra o botão ☰ */
      background: transparent;
      border: none;
      color: white;
      font-size: 32px;
      cursor: pointer;
      z-index: 1001;
    }
    .menu-dropdown {
      position: absolute;
      top: 60px;
      right: 20px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      width: 200px;
      display: none; /* JS controla isso */
      flex-direction: column;
      padding: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      z-index: 1000;
    }
    .menu-dropdown.ativo {
      display: flex !important;
    }
    .menu-dropdown a {
      display: block !important; /* 🔥 Faz os links aparecerem */
      color: white !important;
      padding: 12px;
      text-decoration: none;
      border-radius: 8px;
      font-size: 16px;
    }
    
    

    /* SUBTÍTULO */
    .hero-subtitle{
      font-size: 16px;
      padding: 0 5px;
    }

    /* BOTÕES */
    .hero-acoes{
      display: flex;
      flex-direction: column;
      align-items: center; /* centraliza */
      gap: 12px;
      width: 100%;
      padding: 0 20px; /* Evita que encoste nas bordas da tela */
      box-sizing: border-box;
    }

    .hero-btn, 
    .btn-secundario {
      width: 100%;        /* Largura total do container */
      max-width: 300px;   /* Mas não deixa ficar gigante em tablets */
      box-sizing: border-box; /* Garante que o padding não "estoure" a largura */
      text-align: center;
      padding: 16px 20px; /* Padding interno menor para não cortar */
    }

    /* SOCIAL */
    .hero-social{
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 20px;
      display: flex;
      width: 100%; /* Ocupa a largura total para o justify funcionar */
    }

    /* GRID (remove o empurrão lateral) */
    .grid{
      padding-left: 0;
      justify-content: center;
    }

    /* PROJETO DESTAQUE */
    .projeto-destaque{
      grid-template-columns: 1fr;
      gap: 20px;
    }

    /* IMAGENS */
    .imagem-container{
      height: 220px;
    }

    .projeto-destaque .imagem-container{
      height: 240px;
    }

    /* CARDS */
    .projeto-card{
      width: 100%;
    }

    /* REMOVE QUALQUER OVERFLOW */
    html, body{
      overflow-x: hidden;
    }
  }

  </style>
</head>

<body>
<div class="nav-bg">
  <nav>
    <a href="/">HOME</a>
    <a href="/sobre/">SOBRE</a>
    <a href="/projetos/">PROJETOS</a>
    <a href="/contato/">CONTATO</a>
    
  <button class="menu-toggle">☰</button>

    <div class="menu-dropdown">
      <a href="/">Home</a>
      <a href="/sobre/">Sobre</a>
      <a href="/projetos/">Projetos</a>
      <a href="/contato/">Contato</a>
    </div>
  </nav>
</div>

<script>
const toggle = document.querySelector(".menu-toggle");
const menu = document.querySelector(".menu-dropdown");

toggle.addEventListener("click", () => {
  menu.classList.toggle("ativo");
});
document.addEventListener("click", (e) => {
  if (!toggle.contains(e.target) && !menu.contains(e.target)) {
    menu.classList.remove("ativo");
  }
});
</script>


<div class="container">
  {% block content %}{% endblock %}
</div>

<footer>© {% now "Y" %} Keven Lucas</footer>

</body>
</html>
