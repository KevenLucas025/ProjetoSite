<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Keven | Portfólio{% endblock %}</title>

  <style>

  body{
    font-family: system-ui, Arial;
    max-width: 980px;
    margin: 0 auto;
    padding: 30px;
    line-height: 1.5;
    background-color: #0f0f0f;
    color: #e5e5e5;
  }

  nav{
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  nav a{
    color: white;
    font-weight: bold;
    padding: 6px 12px;
    border-radius: 8px;
    text-decoration: none;
    transition: 0.2s;
  }

  nav a:hover{
    background-color: #e5e5e5;
  }

  .grid{
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .card{
    background-color: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 14px;
  }

  .tag{
    display: inline-block;
    padding: 2px 8px;
    border: 3px solid #ccc;
    border-radius: 999px;
    font-size: 12px;
    margin-right: 6px;
  }
  .hero{
    text-align: center;
    margin-bottom: 40px;
  }
  .hero h1{
    font-size: 42px;
    margin-bottom: 10px;
  }
  .hero p{
    font-size: 18px;
    color: #9ca3af;
  }
  .projeto-card{
    overflow: hidden;
    width: 260px;
    height: 280px;
    margin: 0 auto;

  }
  .imagem-container{
    position: relative;
    width: 100%;
    height: 280px;
    border-radius: 12px;
    overflow: hidden;
    
  }
  .projeto-img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.3s ease;
  }
  .overlay{
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.72);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 12px;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .imagem-container:hover .overlay{
    opacity: 1;
  }
  .imagem-container:hover .projeto-img{
    transform: scale(1.05);
  }
  .btn-overlay{
    background-color: white;
    color: black;
    padding: 10px 16px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.2s ease;
  }
  .btn-overlay:hover{
    background-color: #2563eb;
    color: white;
  }
  .sem-imagem{
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #aaa;
    font-weight: bold;
    background-color: #1f1f1f;
  }
  .destaque-card{
    overflow: hidden;
    width: 700px;
    height: 380px;
    margin: 0 auto;
  }
  .destaque-card .imagem-container{
    height: 380px;
  }
  h2{
    text-align: center;
  }
  footer{
    text-align: center;
    margin-top: 40px;
    color: #9ca3af;
    font-size: 14px;
  }
  .contato-grid{
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(240px, 1fr));
    gap: 20px;
    margin-top: 30px;
  }
  .contato-card{
    display: block;
    background-color: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 16px;
    padding: 20px;
    text-decoration: none;
    color: #e5e5e5;
    transition: 0.25s ease;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  }

  .contato-card:hover{
    transform: translateY(-4px);
    border-color: #3b82f6;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  }

  .contato-card h3{
    margin: 0 0 10px 0;
    font-size: 20px;
    color: white;
  }

  .contato-card p{
    margin: 0;
    color: #9ca3af;
    word-break: break-word;
  }

  </style>
</head>

<body>

<nav>
  <a href="/">Home</a>
  <a href="/sobre/">Sobre</a>
  <a href="/projetos/">Projetos</a>
  <a href="/contato/">Contato</a>
</nav>

{% block content %}{% endblock %}

<footer>© {% now "Y" %} Keven Lucas</footer>

</body>
</html>
