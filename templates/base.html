    overflow: hidden; /* Corta o que sobrar do brilho girando */
    z-index: 1;
  }

  /* O "BRILHO" QUE GIRA */
  .status-open::before {
    content: "";
    position: absolute;
    /* O segredo: o brilho precisa ser maior que o card para cobrir as pontas ao girar */
    width: 800px; 
    height: 800px; 

    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    
    /* Gradiente cônico que cria o rastro de luz */
    background: conic-gradient(
      from 0deg,
      transparent 0%,
      #22d3ee 15%, 
      #ffffff 20%, 
      #22d3ee 25%,
      transparent 40%
    );
    
    animation: girarBorda 4s linear infinite;
    z-index: -2;
  }

  /* FUNDO INTERNO (Cobre o centro para deixar só a borda) */
  .status-open::after {
    content: "";
    position: absolute;
    inset: 2px; /* Largura da borda (ajuste aqui se quiser mais grossa) */
    background: #111;
    border-radius: 11px;
    z-index: -1;
  }

  /* ANIMAÇÃO DE ROTAÇÃO */
  @keyframes girarBorda {
    /* Mantemos o translate(-50%, -50%) para ele não sair do centro enquanto gira */

    justify-content: space-between;

    background: transparent;
    border: none;
    cursor: pointer;

    padding: 0;
  }
    /* 🔥 efeito ao clicar */
  .menu-toggle:active{
    transform: scale(0.85);
    opacity: 0.7;
  }
  /* linhas */
  .menu-toggle span{
    display: block;
    height: 3px;
    width: 100%;
    background: white;
    border-radius: 5px;

    transition: all 0.3s ease;
  }
  /* quando ativo */
  .menu-toggle.ativo span:nth-child(1){
    transform: rotate(45deg) translate(5px, 5px);
  }

  .menu-toggle.ativo span:nth-child(2){
    opacity: 0;
  }

  .menu-toggle.ativo span:nth-child(3){
    transform: rotate(-45deg) translate(6px, -6px);
  }
  
  /* menu escondido */
  .menu-dropdown{
    position: absolute;
    top: 60px;
    right: 20px;
    width: 200px;
    text-align: center;

    background: #1a1a1a;
    
    display: flex;

    overflow: hidden;

    max-height: 0; /* começa fechado */

    padding: 0;
    gap: 0;
    border-width: 0; 

    transition: all 0.50s ease;

  /* quando ativo */

  .btn-enviar:hover {

  }
  /*Botão enviar sugestão*/
  #btnEnviar{
    position: relative;
    padding: 12px 24px;
    border: none;
    background: #4dd0e1;
    color: black;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  /*Faz o botão de enviar virar um looping quando tiver enviando a sugestão*/
  .spinner{
    display: none;
    width: 16px;
    height: 16px;

    border: 2px solid rgba(0,0,0,0.2);
    border-top: 3px solid black;

    border-radius: 50%;
    animation: girar 0.8s linear infinite;

    position: absolute;
    right: 15px;
    top: 24%;
    transform: translateY(-50%);

      padding-left: 20px !important;
  }

  /* 2. O spinner apenas aparece, sem ter padding próprio */
  #btnEnviar.enviando .spinner {
      display: block;

  @keyframes girar {
    from {
      transform: rotate(0deg);
    }
    to {

<canvas id="particulas"></canvas>

  <button class="menu-toggle">
    <span></span>

    <span></span>
  </button>

    <div class="menu-dropdown">
      <a href="/">Home</a>

</div>

</footer>

<script src="{% static 'js/sugestao.js' %}"></script>

<script>

const toggle = document.querySelector(".menu-toggle");
const menu = document.querySelector(".menu-dropdown");

toggle.addEventListener("click", () => {
  menu.classList.toggle("ativo");
  toggle.classList.toggle("ativo");
});
document.addEventListener("click", (e) => {
  if (!toggle.contains(e.target) && !menu.contains(e.target)) {
    menu.classList.remove("ativo");
    toggle.classList.remove("ativo"); // 🔥 ESSENCIAL
  }
});

document.addEventListener("DOMContentLoaded", () =>{
  document.body.classList.add("loaded");
});

document.querySelectorAll("a").forEach(link => {
  link.addEventListener("click", function(e) {

    if (this.id === "btnSugestao" || this.id === "btnSugestaoMobile") {
      e.preventDefault();
      return; //  deixa o modal funcionar
      
    }

    if (this.href && this.target !== "_blank") {
      e.preventDefault();

      document.body.classList.remove("loaded");

      setTimeout(() => {
        window.location = this.href;
      }, 300);
    }
  });
});

// Pega o elemento <canvas> pelo ID "particulas"
const canvas = document.getElementById("particulas");

// Verifica se o canvas existe antes de executar (evita erro)
if (canvas) {

  // Cria o contexto 2D (é o "pincel" para desenhar no canvas)
  const ctx = canvas.getContext("2d");

  // Define a largura do canvas igual à largura da tela
  canvas.width = window.innerWidth;

  // Define a altura do canvas igual à altura da tela
  canvas.height = window.innerHeight;

  // Cria um array vazio para armazenar as partículas
  let particles = [];

  // Loop que cria 80 partículas
  for (let i = 0; i < 80; i++) {

    // Adiciona uma nova partícula ao array
    particles.push({

      // Posição horizontal aleatória dentro do canvas
      x: Math.random() * canvas.width,

      // Posição vertical aleatória dentro do canvas
      y: Math.random() * canvas.height,

      // Tamanho (raio) aleatório da partícula (0 até 2)
      radius: Math.random() * 2,

      // Velocidade horizontal (valor pequeno positivo ou negativo)
      speedX: (Math.random() - 0.5) * 0.9,

      // Velocidade vertical (valor pequeno positivo ou negativo)
      speedY: (Math.random() - 0.5) * 0.5
    });
  }

  // Função responsável por desenhar e animar as partículas
  function drawParticles() {

    // Limpa toda a área do canvas antes de redesenhar (evita "rastro")
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Percorre cada partícula do array
    particles.forEach(p => {

      // Inicia um novo desenho (caminho)
      ctx.beginPath();

      // Desenha um círculo na posição (x, y) com o raio definido
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);

      // Define a cor da partícula (branco com transparência)
      ctx.fillStyle = "rgba(255,255,255,0.5)";

      // Preenche o círculo com a cor definida
      ctx.fill();

      // Atualiza a posição da partícula (movimento)
      p.x += p.speedX;
      p.y += p.speedY;

      // Se a partícula bater na borda esquerda ou direita, inverte direção
      if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;

      // Se a partícula bater no topo ou base, inverte direção
      if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;
    });

    // Faz a animação rodar continuamente (loop suave)
    requestAnimationFrame(drawParticles);
  }

  // Inicia a animação chamando a função pela primeira vez
  drawParticles();


  // 🔥 resize responsivo
  window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });
}

</script>
